name: "Voltronic"
description: "Monitor and control Voltronic based inverters from Home Assistant."
version: "1.0.0"
slug: "voltronic"
init: false
startup: application
udev: true
devices:
  - /dev/hidraw0
  - /dev/hidraw1
  - /dev/hidraw2
  - /dev/ttyUSB0
  - /dev/ttyS0
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
hassio_api: true
hassio_role: default
# access: hassio
# auth_api: true
# apparmor: false
map:
  - addon_config:rw
options:
  device: /dev/hidraw0
  run_interval: 120
  amperage_factor: 1.0
  watt_factor: 1.01
  qpiri: 97
  qpiws: 36
  qmod: 5
  qpigs: 110
  mqtt_server: "127.0.0.1"
  mqtt_port: 1883
  mqtt_topic: "homeassistant"
  devicename: "voltronic"
  mqtt_username: "voltronic"
  mqtt_password: "voltronic"
schema:
  device: str
  run_interval: int
  amperage_factor: float
  watt_factor: float
  qpiri: int
  qpiws: int
  qmod: int
  qpigs: int
  mqtt_server: str
  mqtt_port: int
  mqtt_topic: str
  devicename: str
  mqtt_username: str
  mqtt_password: str